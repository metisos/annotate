# Firebase App Hosting config for the Annotate web app.
# Public env vars (NEXT_PUBLIC_*) ship to the browser; treat as non-secret.
# Secrets live in Cloud Secret Manager and are referenced by name.

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 5
  minInstances: 0
  concurrency: 80

env:
  # ── Firebase Web SDK (must be present at BUILD time so Next.js inlines them) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCwjLiyshW19yvj9ckbFwTkg37dMpJqjSU"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "doublecheck-348a2.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "doublecheck-348a2"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "doublecheck-348a2.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "969672122335"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:969672122335:web:134670255610dcc9cdee6a"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-H3NM4GN19J"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    value: "https://annotate.metisos.co"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CHROME_EXTENSION_URL
    value: "https://chromewebstore.google.com/detail/kbfnejmkbfchkimiphfbnegpmngabboa"
    availability:
      - BUILD
      - RUNTIME

  # ── GCP / Vertex / runtime config (server-only) ──
  - variable: GCP_PROJECT_ID
    value: "doublecheck-348a2"
    availability:
      - RUNTIME

  - variable: VERTEX_LOCATION
    value: "us-central1"
    availability:
      - RUNTIME

  - variable: GEMINI_MODEL
    value: "gemini-2.5-pro"
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: "doublecheck-348a2"
    availability:
      - RUNTIME

  - variable: MONGODB_DB
    value: "annotate_db"
    availability:
      - RUNTIME

  - variable: ANNOTATE_CLIPS_BUCKET
    value: "annotate-clips-prod"
    availability:
      - RUNTIME

  # ── Secrets (Cloud Secret Manager) ──
  - variable: MONGODB_URI
    secret: MONGODB_URI

  - variable: TWELVELABS_API_KEY
    secret: TWELVELABS_API_KEY

  - variable: TWELVELABS_INDEX_ID
    secret: TWELVELABS_INDEX_ID

  - variable: E2B_API_KEY
    secret: E2B_API_KEY

  - variable: YOUTUBE_API_KEY
    secret: YOUTUBE_API_KEY

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  - variable: USC_FEDERATION_TOKEN
    secret: USC_FEDERATION_TOKEN
